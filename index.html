<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Live Countdown</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --primary-color: #bb00ff;
  --secondary-color: #ffc0cb;
  --bg-color: #1e1e3e;
  --text-color: #ffffff;
}

body {
  margin: 0;
  font-family: 'Press Start 2P', cursive;
  background-color: var(--bg-color);
  color: var(--text-color);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
}

h1 {
  font-size: 1.8em;
  color: var(--primary-color);
  text-align: center;
  margin-bottom: 10px;
  text-shadow: 0 0 10px rgba(187,0,255,0.6);
}

#description {
  max-width: 500px;
  text-align: center;
  font-size: 0.9em;
  margin-bottom: 15px;
  color: var(--secondary-color);
  line-height: 1.5;
}

#mode-indicator {
  font-size: 0.7em;
  margin-bottom: 10px;
  color: var(--primary-color);
}

#countdown {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 15px;
  width: 100%;
  max-width: 400px;
}

.time-box {
  background: #2a2a4a;
  border: 2px solid var(--primary-color);
  border-radius: 12px;
  padding: 18px 10px;
  flex: 1 1 80px;
  text-align: center;
  color: var(--primary-color);
  font-size: 1.5em;
}

.label {
  font-size: 0.55em;
  margin-top: 5px;
  color: var(--secondary-color);
}

#fun-message {
  font-size: 0.85em;
  color: var(--secondary-color);
  margin-bottom: 15px;
  min-height: 30px;
  text-align: center;
}

.btn {
  background-color: var(--primary-color);
  color: #000;
  padding: 10px 20px;
  text-decoration: none;
  font-size: 0.8em;
  border-radius: 8px;
  margin: 5px;
  display: inline-block;
  transition: 0.3s;
  border: none;
  cursor: pointer;
}

.btn:hover {
  background-color: var(--secondary-color);
  color: var(--primary-color);
}

#calendar-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

</style>
</head>

<body>

<h1>Minecraft Live 2026</h1>

<div id="description">
Join the biggest Minecraft event of the year!<br>
<strong>March 21, 2026</strong>
</div>

<div id="mode-indicator">Currently: Main Show (1:00 PM)</div>

<button class="btn" id="toggle-show">
Switch to Pre-Show (12:30 PM)
</button>

<div id="countdown">
  <div class="time-box"><span id="days">0</span><div class="label">Days</div></div>
  <div class="time-box"><span id="hours">0</span><div class="label">Hours</div></div>
  <div class="time-box"><span id="minutes">0</span><div class="label">Minutes</div></div>
  <div class="time-box"><span id="seconds">0</span><div class="label">Seconds</div></div>
</div>

<div id="fun-message"></div>

<a href="https://www.youtube.com/watch?v=Is5IswM87EQ" target="_blank" class="btn">
Watch Live Stream
</a>

<div id="calendar-buttons">
  <a href="#" class="btn" id="add-google">Google Calendar</a>
  <a href="#" class="btn" id="add-outlook">Outlook</a>
  <a href="#" class="btn" id="add-ical">Apple Calendar</a>
</div>

<script>

// --- SHOW STATES ---
let isPreShow = false;

const preShowDate = new Date("March 21, 2026 12:30:00 GMT-0400");
const mainShowDate = new Date("March 21, 2026 13:00:00 GMT-0400");

let eventDate = mainShowDate;

// --- ELEMENTS ---
const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");
const funMessage = document.getElementById("fun-message");
const toggleBtn = document.getElementById("toggle-show");
const modeIndicator = document.getElementById("mode-indicator");

// --- TOGGLE ---
toggleBtn.addEventListener("click", () => {
  isPreShow = !isPreShow;

  if (isPreShow) {
    eventDate = preShowDate;
    toggleBtn.textContent = "Switch to Main Show (1:00 PM)";
    modeIndicator.textContent = "Currently: Pre-Show (12:30 PM)";
  } else {
    eventDate = mainShowDate;
    toggleBtn.textContent = "Switch to Pre-Show (12:30 PM)";
    modeIndicator.textContent = "Currently: Main Show (1:00 PM)";
  }

  updateCalendarLinks();
});

// --- COUNTDOWN ---
function updateCountdown() {
  const now = new Date();
  const diff = eventDate - now;

  if(diff <= 0){
    document.getElementById('countdown').innerHTML = "🎉 It's LIVE! 🎉";
    return;
  }

  daysEl.textContent = Math.floor(diff / (1000*60*60*24));
  hoursEl.textContent = Math.floor((diff / (1000*60*60)) % 24);
  minutesEl.textContent = Math.floor((diff / (1000*60)) % 60);
  secondsEl.textContent = Math.floor((diff / 1000) % 60);
}

setInterval(updateCountdown, 1000);
updateCountdown();

// --- CALENDAR LINKS ---
function updateCalendarLinks() {

  let start, end, label;

  if (isPreShow) {
    start = "20260321T123000";
    end = "20260321T130000";
    label = "Minecraft Live 2026 Pre-Show";
  } else {
    start = "20260321T130000";
    end = "20260321T150000";
    label = "Minecraft Live 2026 Main Show";
  }

  document.getElementById("add-google").href =
    `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(label)}&dates=${start}/${end}`;

  document.getElementById("add-outlook").href =
    `https://outlook.office.com/calendar/0/deeplink/compose?subject=${encodeURIComponent(label)}&startdt=2026-03-21T${start.slice(9,11)}:${start.slice(11,13)}:00&enddt=2026-03-21T${end.slice(9,11)}:${end.slice(11,13)}:00`;

  const ics = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${label}
DTSTART:${start}
DTEND:${end}
END:VEVENT
END:VCALENDAR`;

  document.getElementById("add-ical").href =
    "data:text/calendar;charset=utf8," + encodeURIComponent(ics);

  document.getElementById("add-ical").download =
    label.replace(/\s+/g, "_") + ".ics";
}

updateCalendarLinks();

</script>

</body>
</html>
